<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Portfolio</title>
  <meta name="description" content="Minimal portfolio site template" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/seating.css" />
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <nav class="global-nav" aria-label="Primary">
        <a href="#about">About</a>
        <a href="#schedule">Schedule</a>
        <a href="#seating">席表</a>
        <a href="#smallsnow">小雪</a>
        <a href="#takayanagi">高柳傑</a>
      </nav>
    </header>

    <main>
      <section class="hero" id="about">
        <p class="hero-kicker" id="site-subtitle">portfolio</p>
        <h1 class="hero-title" id="site-title">Your Name</h1>
        <div class="hero-links" id="hero-links"></div>
      </section>

      <section class="acknowledgement">
        <div class="section-heading">
          <span>Message</span>
          <h2>謝辞</h2>
        </div>
        <div class="acknowledgement-body" id="acknowledgement-text"></div>
      </section>

      <section class="schedule-section" id="schedule">
        <div class="section-heading">
          <span>Ceremony</span>
          <h2>Wedding Schedule</h2>
        </div>
        <div class="schedule-wrap">
          <ol class="timeline" id="schedule-list"></ol>
        </div>
      </section>

      <section class="gallery-section" id="smallsnow">
        <div class="section-heading section-heading-with-links">
          <div>
            <span>Category</span>
            <h2>小雪</h2>
          </div>
          <div class="section-links" id="smallsnow-links"></div>
        </div>
        <div class="gallery-grid" id="smallsnow-gallery"></div>
      </section>

      <section class="gallery-section" id="takayanagi">
        <div class="section-heading section-heading-with-links">
          <div>
            <span>Category</span>
            <h2>高柳傑</h2>
          </div>
          <div class="section-links" id="takayanagi-links"></div>
        </div>
        <div class="gallery-grid" id="takayanagi-gallery"></div>
      </section>
    </main>
  </div>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">×</button>
    <figure class="lightbox-figure">
      <img id="lightbox-image" src="" alt="" />
      <figcaption id="lightbox-caption"></figcaption>
    </figure>
  </div>

  <div class="modal" id="info-modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="info-modal-title">
    <div class="modal-panel">
      <button class="modal-close" id="modal-close" aria-label="Close">×</button>
      <p class="modal-kicker">Ceremony Note</p>
      <h3 id="info-modal-title">祝言とは？</h3>
      <div class="modal-body" id="info-modal-body"></div>
    </div>
  </div>

  <script src="content/site-content.js"></script>
  <script src="content/gallery-data.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="content/seating-data.js"></script>
  <script src="assets/js/seating.js"></script>
</body>
</html>
